---
layout: default
title: Archive
---

<section class="archive-page">
  <div class="container">
    <h2 class="page-title">📚 Archive</h2>
    
    <div class="archive-list-full">
      {% assign sorted_posts = site.posts | sort: 'date' | reverse %}
      {% for post in sorted_posts %}
        <a href="{{ post.url | relative_url }}" class="archive-item">
          <span class="archive-date">{{ post.date | date: "%b %d, %Y" }}</span>
          <span class="archive-title">{{ post.title }}</span>
          <svg class="archive-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </a>
      {% endfor %}
    </div>
    
    <div class="back-link-container">
      <a href="{{ '/' | relative_url }}" class="back-link">← Back to Home</a>
    </div>
  </div>
</section>

<style>
.archive-page {
  padding: 3rem 0;
}

.page-title {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--slate-100);
  margin-bottom: 2rem;
}

.archive-list-full {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.archive-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  background: var(--slate-800);
  border: 1px solid var(--slate-700);
  border-radius: 0.5rem;
  transition: all 0.2s ease;
}

.archive-item:hover {
  background: var(--slate-700);
  border-color: var(--emerald-500);
}

.archive-date {
  font-size: 0.875rem;
  color: var(--emerald-400);
  font-weight: 500;
  min-width: 100px;
  flex-shrink: 0;
}

.archive-title {
  flex: 1;
  color: var(--slate-200);
  font-weight: 500;
}

.archive-arrow {
  width: 1rem;
  height: 1rem;
  color: var(--slate-500);
}

.back-link-container {
  margin-top: 2rem;
}

.back-link {
  color: var(--emerald-400);
  font-weight: 500;
  transition: color 0.2s;
}

.back-link:hover {
  color: var(--emerald-300);
}
</style>
