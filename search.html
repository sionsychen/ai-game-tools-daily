---
layout: default
title: Search
---

<section class="search-page">
  <h2 class="page-title">🔍 Search</h2>
  
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Search articles..." class="search-input" autocomplete="off">
  </div>
  
  <div id="search-results" class="search-results">
    <p class="search-hint">Enter keywords to search articles...</p>
  </div>
  
  <div class="back-link-container">
    <a href="{{ '/' | relative_url }}" class="back-link">← Back to Home</a>
  </div>
</section>

<script>
// Build search data from posts
const searchData = [
  {% for post in site.posts %}
  {% for article in post.articles %}
  {
    title: {{ article.title | jsonify }},
    url: {{ post.url | relative_url | jsonify }},
    date: {{ post.date | jsonify }},
    category: {{ article.category | jsonify }},
    summary: {{ article.summary | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
  {% endfor %}
];

const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', function() {
  const query = this.value.toLowerCase().trim();
  
  if (query.length === 0) {
    searchResults.innerHTML = '<p class="search-hint">Enter keywords to search articles...</p>';
    return;
  }
  
  const results = searchData.filter(item => {
    return item.title.toLowerCase().includes(query) ||
           (item.summary && item.summary.toLowerCase().includes(query)) ||
           (item.category && item.category.toLowerCase().includes(query));
  });
  
  if (results.length === 0) {
    searchResults.innerHTML = '<p class="search-hint">No matching articles found.</p>';
    return;
  }
  
  let html = `<div class="results-count">Found ${results.length} result${results.length > 1 ? 's' : ''}</div>
    <div class="results-list">`;
  
  results.forEach(item => {
    html += `
      <a href="${item.url}" class="result-item">
        <div class="result-date">${item.date.substring(0, 10)}</div>
        <div class="result-title">${item.title}</div>
      </a>
    `;
  });
  
  html += '</div>';
  searchResults.innerHTML = html;
});
</script>

<style>
.search-page {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1rem;
}

.page-title {
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 1.5rem;
}

.search-box {
  margin-bottom: 1.5rem;
}

.search-input {
  width: 100%;
  padding: 0.875rem 1rem;
  font-size: 1rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.search-input:focus {
  outline: none;
  border-color: var(--accent);
}

.search-hint {
  color: var(--text-muted);
  text-align: center;
  padding: 2rem 0;
}

.results-count {
  color: var(--text-muted);
  margin-bottom: 1rem;
  font-size: 0.9rem;
}

.results-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.result-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  text-decoration: none;
  transition: all 0.2s;
}

.result-item:hover {
  background: var(--bg-tertiary);
  border-color: var(--accent-dark);
}

.result-date {
  font-family: var(--font-mono);
  font-size: 0.875rem;
  color: var(--accent-light);
  min-width: 100px;
  flex-shrink: 0;
}

.result-title {
  color: var(--text-primary);
  font-weight: 500;
}

.back-link-container {
  margin-top: 2rem;
}

.back-link {
  color: var(--accent-light);
  text-decoration: none;
  font-weight: 500;
}

.back-link:hover {
  color: var(--accent);
}
</style>
