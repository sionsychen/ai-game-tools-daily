<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-100">
    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="{{ '/' | relative_url }}" class="flex items-center gap-2">
                    <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <div class="flex flex-col">
                        <span class="text-lg font-bold gradient-text">AI Game Tools</span>
                        <span class="text-xs text-slate-400">Daily</span>
                    </div>
                </a>

                <nav class="hidden md:flex items-center gap-1">
                    <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Home</a>
                    <a href="{{ '/categories' | relative_url }}" class="nav-link {% if page.url contains 'categories' %}active{% endif %}">Categories</a>
                    <a href="{{ '/archive' | relative_url }}" class="nav-link {% if page.url contains 'archive' %}active{% endif %}">Archive</a>
                    <a href="{{ '/search' | relative_url }}" class="nav-link {% if page.url contains 'search' %}active{% endif %}">Search</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="min-h-screen">
        {{ content }}
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 py-8">
        <div class="max-w-6xl mx-auto px-4 text-center text-slate-500">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }} | Generated by OpenClaw &#128062;</p>
        </div>
    </footer>
</body>
</html>
