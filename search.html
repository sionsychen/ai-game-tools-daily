---
layout: default
title: Search
---

<section class="search-page">
  <div class="container">
    <h2 class="page-title">🔍 Search</h2>
    
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search articles..." class="search-input" autocomplete="off">
    </div>
    
    <div id="search-results" class="search-results">
      <p class="search-hint">Enter keywords to search articles...</p>
    </div>
    
    <div class="back-link-container">
      <a href="{{ '/' | relative_url }}" class="back-link">← Back to Home</a>
    </div>
  </div>
</section>

<script>
// Build search data from posts
const searchData = [
  {% for post in site.posts %}
  {% for article in post.articles %}
  {
    title: {{ article.title | jsonify }},
    url: {{ post.url | relative_url | jsonify }},
    date: {{ post.date | jsonify }},
    category: {{ article.category | jsonify }},
    summary: {{ article.summary | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
  {% endfor %}
];

const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', function() {
  const query = this.value.toLowerCase().trim();
  
  if (query.length === 0) {
    searchResults.innerHTML = '<p class="search-hint">Enter keywords to search articles...</p>';
    return;
  }
  
  const results = searchData.filter(item => {
    return item.title.toLowerCase().includes(query) ||
           (item.summary && item.summary.toLowerCase().includes(query)) ||
           (item.category && item.category.toLowerCase().includes(query));
  });
  
  if (results.length === 0) {
    searchResults.innerHTML = '<p class="search-hint">No matching articles found.</p>';
    return;
  }
  
  let html = `<div class="results-count">Found ${results.length} result${results.length > 1 ? 's' : ''}</div>
    <div class="results-list">`;
  
  results.forEach(item => {
    html += `
      <a href="${item.url}" class="result-item">
        <span class="result-date">${item.date.substring(0, 10)}</span>
        <span class="result-title">${item.title}</span>
      </a>
    `;
  });
  
  html += '</div>';
  searchResults.innerHTML = html;
});
</script>

<style>
.search-page {
  padding: 3rem 0;
}

.page-title {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--slate-100);
  margin-bottom: 2rem;
}

.search-box {
  margin-bottom: 1.5rem;
}

.search-input {
  width: 100%;
  padding: 0.875rem 1rem;
  font-size: 1rem;
  border: 1px solid var(--slate-700);
  border-radius: 0.5rem;
  background: var(--slate-800);
  color: var(--slate-100);
}

.search-input:focus {
  outline: none;
  border-color: var(--emerald-500);
}

.search-input::placeholder {
  color: var(--slate-500);
}

.search-hint {
  color: var(--slate-400);
  text-align: center;
  padding: 2rem 0;
}

.results-count {
  color: var(--slate-400);
  margin-bottom: 1rem;
  font-size: 0.9rem;
}

.results-list {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.result-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  background: var(--slate-800);
  border: 1px solid var(--slate-700);
  border-radius: 0.5rem;
  transition: all 0.2s ease;
}

.result-item:hover {
  background: var(--slate-700);
  border-color: var(--emerald-500);
}

.result-date {
  font-size: 0.875rem;
  color: var(--emerald-400);
  font-weight: 500;
  min-width: 100px;
  flex-shrink: 0;
}

.result-title {
  flex: 1;
  color: var(--slate-200);
  font-weight: 500;
}

.back-link-container {
  margin-top: 2rem;
}

.back-link {
  color: var(--emerald-400);
  font-weight: 500;
  transition: color 0.2s;
}

.back-link:hover {
  color: var(--emerald-300);
}
</style>
