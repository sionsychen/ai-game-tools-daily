---
layout: default
---

<article class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <header class="mb-8">
        <h1 class="text-3xl md:text-4xl font-bold mb-4">{{ page.title }}</h1>
        <p class="text-slate-400">{{ page.date | date: "%B %d, %Y" }}</p>
    </header>

    <div class="article-content">
        {{ content }}
    </div>

    <footer class="mt-12 pt-8 border-t border-slate-800">
        <a href="{{ '/' | relative_url }}" class="text-indigo-400 hover:text-indigo-300">&larr; Back to Home</a>
    </footer>
</article>
