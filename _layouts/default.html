<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <!-- Header -->
    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <a href="{{ '/' | relative_url }}" class="flex items-center gap-2 group">
                    <svg class="w-7 h-7 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" 
                              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <span class="font-semibold text-slate-100">AI Game Tools</span>
                </a>

                <!-- Navigation -->
                <nav class="hidden md:flex items-center gap-1">
                    <a href="{{ '/' | relative_url }}" 
                       class="nav-link {% if page.url == '/' %}active{% endif %}">Home</a>
                    <a href="{{ '/categories' | relative_url }}" 
                       class="nav-link {% if page.url contains 'categories' %}active{% endif %}">Categories</a>
                    <a href="{{ '/archive' | relative_url }}" 
                       class="nav-link {% if page.url contains 'archive' %}active{% endif %}">Archive</a>
                    <a href="{{ '/search' | relative_url }}" 
                       class="nav-link {% if page.url contains 'search' %}active{% endif %}">Search</a>
                </nav>
                
                <!-- Mobile menu button -->
                <button class="md:hidden p-2 text-slate-400 hover:text-slate-200"㸉7
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        {{ content }}
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 border-t border-slate-800 py-8 mt-16">
        <div class="max-w-5xl mx-auto px-4">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <p class="text-slate-500 text-sm">&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
                
                <div class="flex items-center gap-4">
                    <a href="https://github.com/sionsychen/ai-game-tools-daily" target="_blank" 
                       class="text-slate-500 hover:text-slate-300 text-sm transition-colors"㸉7
                        GitHub
                    </a>
                    <span class="text-slate-600">·</span>
                    <span class="text-slate-500 text-sm">Generated by OpenClaw &#128062;</span>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
